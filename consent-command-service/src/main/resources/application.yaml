spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: consent-kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tcc}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/tcc/protocol/openid-connect/certs}

app:
  outbox:
    poll-interval: 5000

outbox:
  puller:
    enabled: true

base-url: /api/v1/consent

user-service:
  url: ${USER_SERVICE_URL:http://user-service:8080}

tcc:
  security:
    enabled: true
    opa:
      enabled: true
      url: ${OPA_URL:http://localhost:8181/v1/data/consent-command/authz/decision}
      timeout: 2s
    pip:
      url: ${PIP_URL:http://consent-query-service:8080/api/v1/consent}
    headers:
      purpose: X-Purpose
      data-subject-id: X-Data-Subject-Id
      data-subject-ids: X-Data-Subject-Ids
      data-category: X-Data-Category
      data-categories: X-Data-Categories
      correlation-id: X-Correlation-Id
